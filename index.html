<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio DW : Order Form</title>
    <style>
        :root { 
            --point: #bada55; 
            --bg: transparent; 
            --card: #151512; 
            --input-bg: #fdfdf9; 
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; }
        
        /* [수정] body 여백을 0으로 만들어 iframe에 딱 붙게 함 */
        body { background-color: var(--bg); color: #fff; padding: 0; display: flex; justify-content: center; }
        .container { max-width: 850px; width: 100%; }

        .form-container { 
            background-color: var(--card);
            background-image: radial-gradient(rgba(186, 218, 85, 0.1) 1px, transparent 1px);
            background-size: 20px 20px;
            /* [수정] 상하 패딩을 60px -> 30px로 줄임 */
            padding: 30px 40px; 
            border: 1px solid #2a2a26;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            /* [수정] 하단 마진 제거 */
            margin-bottom: 0; 
        }

        .header { margin-bottom: 30px; }
        .header h1 { color: var(--input-bg); font-size: 28px; font-weight: 900; letter-spacing: -1px; }
        .header p { color: #fff; font-size: 14px; opacity: 0.7; }

        .form-group { margin-bottom: 25px; }
        .form-group label.title { display: block; color: var(--point); font-weight: 700; margin-bottom: 10px; font-size: 14px; }
        
        input[type="text"], input[type="date"], textarea {
            width: 100%; padding: 12px 20px; background: var(--input-bg); border: none;
            border-radius: 50px; font-size: 14px; color: #1a1a1a; outline: none;
        }
        textarea { border-radius: 20px; min-height: 100px; resize: vertical; }

        .checkbox-group { display: flex; flex-wrap: wrap; gap: 10px 20px; }
        .checkbox-label { display: flex; align-items: center; cursor: pointer; font-size: 13px; color: #eee; }
        input[type="checkbox"], input[type="radio"] { appearance: none; -webkit-appearance: none; width: 18px; height: 18px; background: #fdfdf9; margin-right: 8px; cursor: pointer; position: relative; border-radius: 4px; }
        input[type="radio"] { border-radius: 50%; }
        input:checked { background-color: var(--point); }
        input:checked::after { content: '✔'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #1a1a1a; font-size: 10px; font-weight: 900; }

        .submit-area { text-align: center; margin-top: 30px; }
        .submit-btn {
            background: linear-gradient(to bottom, #dcf073 0%, #a2c629 100%);
            color: #1a1a1a; border: none; padding: 14px 50px; font-size: 20px; font-weight: 900; border-radius: 50px;
            cursor: pointer; box-shadow: 0 5px 0 #6e881c;
        }
        .submit-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #6e881c; }

        @media (max-width: 600px) { .form-container { padding: 25px 20px; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-container">
            <div class="header">
                <h1>Studio DW : Order Form</h1>
                <p>“빠르고 쉽게 문의하세요”</p>
            </div>
            <form id="orderForm">
                <div class="form-group">
                    <label class="title">업로드 채널 <span>(링크)</span></label>
                    <input type="text" id="channel" placeholder="채널 링크">
                </div>
                <div class="form-group">
                    <label class="title">원곡 링크 <span>(Youtube 등)</span></label>
                    <input type="text" id="original_link" placeholder="참고 링크">
                </div>
                <div class="form-group">
                    <label class="title">사용 용도</label>
                    <input type="text" id="usage" placeholder="Youtube / 방송용 등">
                </div>
                <div class="form-group">
                    <label class="title">신청 타입</label>
                    <div class="checkbox-group">
                        <label class="checkbox-label"><input type="radio" name="type" value="스탠다드"> 스탠다드</label>
                        <label class="checkbox-label"><input type="radio" name="type" value="프리미엄"> 프리미엄</label>
                        <label class="checkbox-label"><input type="radio" name="type" value="시그니처"> 시그니처</label>
                        <label class="checkbox-label"><input type="radio" name="type" value="상담희망"> 상담희망</label>
                    </div>
                </div>
                <div class="form-group">
                    <label class="title">자막 언어</label>
                    <div class="checkbox-group">
                        <label class="checkbox-label"><input type="radio" name="lang" value="한국어"> 한국어</label>
                        <label class="checkbox-label"><input type="radio" name="lang" value="일본어"> 일본어</label>
                        <label class="checkbox-label"><input type="radio" name="lang" value="영어"> 영어</label>
                    </div>
                </div>
                <div class="form-group">
                    <label class="title">추가옵션</label>
                    <div class="checkbox-group">
                        <label class="checkbox-label"><input type="checkbox" name="opt" value="썸네일"> 썸네일</label>
                        <label class="checkbox-label"><input type="checkbox" name="opt" value="Live2D"> Live2D</label>
                        <label class="checkbox-label"><input type="checkbox" name="opt" value="배경2D"> 배경(2D)</label>
                        <label class="checkbox-label"><input type="checkbox" name="opt" value="배경3D"> 배경(3D)</label>
                        <label class="checkbox-label"><input type="checkbox" name="opt" value="수익창출"> 수익창출</label>
                        <label class="checkbox-label"><input type="checkbox" name="opt" value="빠른마감"> 빠른마감</label>
                        <label class="checkbox-label"><input type="checkbox" name="opt" value="숏폼"> SNS/숏폼</label>
                    </div>
                </div>
                <div class="form-group">
                    <label class="title">희망 마감일</label>
                    <input type="date" id="deadline">
                </div>
                <div class="form-group">
                    <label class="title">희망 연출 / 크레딧</label>
                    <textarea id="credit" placeholder="희망 사항 입력"></textarea>
                </div>
                <div class="form-group">
                    <label class="checkbox-label" style="color: var(--point); font-weight: bold;">
                        <input type="checkbox" id="agree"> 안내사항을 확인하고 이에 동의합니다.
                    </label>
                </div>
                <div class="submit-area">
                    <button type="button" class="submit-btn" onclick="copyResult()">작성완료</button>
                </div>
            </form>
        </div>
    </div>
    <script>
        function copyResult() {
            if(!document.getElementById('agree').checked) { alert('동의가 필요합니다.'); return; }
            var getVal = function(id) { return document.getElementById(id).value || '미입력'; };
            var getCheck = function(name) {
                var checked = Array.from(document.querySelectorAll('input[name="' + name + '"]:checked'));
                return checked.map(function(el) { return el.value; }).join(', ') || '선택안함';
            };
            var text = "[STUDIO DW 신청서]\n■ 채널: " + getVal('channel') + "\n■ 원곡: " + getVal('original_link') + "\n■ 용도: " + getVal('usage') + "\n■ 타입: " + getCheck('type') + "\n■ 언어: " + getCheck('lang') + "\n■ 옵션: " + getCheck('opt') + "\n■ 마감일: " + getVal('deadline') + "\n■ 연출/크레딧: \n" + getVal('credit');
            var t = document.createElement("textarea");
            document.body.appendChild(t);
            t.value = text; t.select();
            document.execCommand('copy');
            document.body.removeChild(t);
            alert('양식이 복사되었습니다!');
        }
    </script>
</body>
</html>
