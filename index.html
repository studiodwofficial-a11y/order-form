<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio DW : Order Form</title>
    <style>
        :root { 
            --point: #bada55; 
            --glow: #dcf073; 
            --bg: transparent; 
            --card: #151512; 
            --input-bg: #fdfdf9; 
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; }
        
        body { background-color: var(--bg); color: #fff; padding: 20px; display: flex; justify-content: center; }
        
        .container { max-width: 1180px; width: 100%; margin: 0 auto; }

        .form-container { 
            background-color: var(--card);
            background-image: radial-gradient(rgba(186, 218, 85, 0.12) 1px, transparent 1px);
            background-size: 22px 22px;
            padding: 50px 60px;
            border: 1.5px solid #2a2a26;
            border-radius: 35px;
            width: 100%;
        }

        .header { margin-bottom: 45px; display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
        .header-logo { width: 60px; height: 60px; object-fit: contain; }
        .header h1 { color: var(--input-bg); font-size: 36px; font-weight: 900; letter-spacing: -1.5px; }

        .form-group { margin-bottom: 30px; width: 100%; }
        .form-group label.title { display: block; color: var(--point); font-weight: 700; margin-bottom: 12px; font-size: 15px; }

        /* [모션 복구] 입력창 기본 및 호버/포커스 효과 */
        input[type="text"], input[type="date"], textarea {
            width: 100%; padding: 16px 22px; background: var(--input-bg); border: 2px solid transparent;
            border-radius: 50px; font-size: 15px; color: #1a1a1a; outline: none; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); /* 부드러운 가속도 추가 */
        }
        textarea { border-radius: 20px; min-height: 140px; resize: vertical; }

        /* 마우스 올렸을 때 살짝 반응 */
        input:hover, textarea:hover { transform: translateY(-2px); }

        /* 클릭(포커스) 시 위로 떠오르며 글로우 발생 */
        input:focus, textarea:focus { 
            background: #fff;
            transform: translateY(-4px); 
            border-color: var(--glow); 
            box-shadow: 0 10px 20px rgba(220, 240, 115, 0.3); 
        }

        .checkbox-group { display: flex; flex-wrap: wrap; gap: 12px 25px; }
        .checkbox-label { display: flex; align-items: center; cursor: pointer; font-size: 14px; color: #eee; transition: 0.2s; }
        .checkbox-label:hover { color: var(--glow); }

        input[type="checkbox"], input[type="radio"] { appearance: none; width: 19px; height: 19px; background: #fdfdf9; margin-right: 10px; cursor: pointer; position: relative; transition: 0.2s; }
        input[type="radio"] { border-radius: 50%; }
        input:checked { background-color: var(--point); box-shadow: 0 0 10px rgba(186, 218, 85, 0.5); }
        input:checked::after { content: '✔'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #1a1a1a; font-size: 11px; font-weight: 900; }

        /* [모션 복구] 작성완료 버튼 애니메이션 */
        .submit-area { text-align: center; margin-top: 45px; width: 100%; }
        .submit-btn {
            background: linear-gradient(to bottom, #dcf073 0%, #a2c629 100%);
            color: #1a1a1a; border: none; padding: 18px 80px; font-size: 24px; font-weight: 900; border-radius: 60px;
            cursor: pointer; box-shadow: 0 6px 0 #6e881c;
            transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .submit-btn:hover { transform: translateY(-2px); filter: brightness(1.05); }
        .submit-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #6e881c; }

        .notice-link { color: var(--point); text-decoration: underline; cursor: pointer; font-weight: 800; }

        @media (max-width: 768px) {
            .form-container { padding: 30px 20px; }
            .header h1 { font-size: 26px; }
            .submit-btn { width: 100%; padding: 16px 0; font-size: 20px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="form-container">
        <div class="header">
            <img src="본인_로고_주소" alt="logo" class="header-logo">
            <h1>Studio DW : Order Form</h1>
        </div>

        <form id="orderForm">
            <div class="form-group"><label class="title">업로드 채널 (링크)</label><input type="text" id="channel" placeholder="채널 링크"></div>
            <div class="form-group"><label class="title">원곡 링크</label><input type="text" id="original_link" placeholder="Youtube 등"></div>
            <div class="form-group"><label class="title">사용 용도</label><input type="text" id="usage" placeholder="용도 입력"></div>

            <div class="form-group">
                <label class="title">신청 타입 (필수)</label>
                <div class="checkbox-group">
                    <label class="checkbox-label"><input type="radio" name="type" value="스탠다드"> 스탠다드</label>
                    <label class="checkbox-label"><input type="radio" name="type" value="프리미엄"> 프리미엄</label>
                    <label class="checkbox-label"><input type="radio" name="type" value="시그니처"> 시그니처</label>
                    <label class="checkbox-label"><input type="radio" name="type" value="상담희망"> 상담희망</label>
                </div>
            </div>

            <div class="form-group">
                <label class="title">자막 언어 (필수)</label>
                <div class="checkbox-group">
                    <label class="checkbox-label"><input type="radio" name="lang" value="한국어"> 한국어</label>
                    <label class="checkbox-label"><input type="radio" name="lang" value="일본어"> 일본어</label>
                    <label class="checkbox-label"><input type="radio" name="lang" value="영어"> 영어</label>
                </div>
            </div>

            <div class="form-group">
                <label class="title">추가옵션 (중복 가능)</label>
                <div class="checkbox-group">
                    <label class="checkbox-label"><input type="checkbox" name="opt" value="썸네일"> 썸네일</label>
                    <label class="checkbox-label"><input type="checkbox" name="opt" value="Live2D"> Live2D</label>
                    <label class="checkbox-label"><input type="checkbox" name="opt" value="배경2D"> 배경(2D)</label>
                    <label class="checkbox-label"><input type="checkbox" name="opt" value="배경3D"> 배경(3D)</label>
                    <label class="checkbox-label"><input type="checkbox" name="opt" value="수익창출"> 수익창출</label>
                    <label class="checkbox-label"><input type="checkbox" name="opt" value="빠른마감"> 빠른마감</label>
                    <label class="checkbox-label"><input type="checkbox" name="opt" value="숏폼"> SNS/숏폼</label>
                </div>
            </div>

            <div class="form-group"><label class="title">희망 마감일</label><input type="date" id="deadline"></div>
            <div class="form-group"><label class="title">희망 연출 / 크레딧</label><textarea id="credit" placeholder="상세 요청사항"></textarea></div>

            <div class="form-group" style="background: rgba(186, 218, 85, 0.05); padding: 20px; border-radius: 15px; border: 1px dashed var(--point);">
                <p style="margin-bottom: 12px;">
                    <span class="notice-link" onclick="window.parent.scrollTo({top: 8500, behavior: 'smooth'});">👉 [이곳을 클릭하여 안내사항 확인하기]</span>
                </p>
                <label class="checkbox-label" style="font-weight: bold; color: var(--point);">
                    <input type="checkbox" id="agree"> 위 안내사항을 확인하였으며 동의합니다.
                </label>
            </div>

            <div class="submit-area">
                <button type="button" class="submit-btn" onclick="copyResult()">작성완료</button>
            </div>
        </form>
    </div>
</div>

<script>
    function copyResult() {
        if(!document.getElementById('agree').checked) { alert('안내사항 동의에 체크해주세요!'); return; }
        var getCheck = (name) => Array.from(document.querySelectorAll('input[name="'+name+'"]:checked')).map(el => el.value).join(', ');
        var type = getCheck('type'), lang = getCheck('lang'), opt = getCheck('opt') || '선택안함';
        if(!type || !lang) { alert('필수 항목을 선택해주세요!'); return; }
        var getVal = id => document.getElementById(id).value || '미입력';
        var text = `[STUDIO DW 신청서]\n■ 채널: ${getVal('channel')}\n■ 원곡: ${getVal('original_link')}\n■ 용도: ${getVal('usage')}\n■ 타입: ${type}\n■ 언어: ${lang}\n■ 옵션: ${opt}\n■ 마감일: ${getVal('deadline')}\n■ 연출/크레딧:\n${getVal('credit')}`;
        var t = document.createElement("textarea"); document.body.appendChild(t); t.value = text; t.select(); document.execCommand('copy'); document.body.removeChild(t);
        alert('양식이 복사되었습니다!');
    }
</script>
</body>
</html>
