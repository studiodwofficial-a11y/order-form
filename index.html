<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio DW : Order Form</title>
    <style>
        :root { 
            --point: #bada55; 
            --glow: #dcf073; 
            --bg: transparent; 
            --card: #151512; 
            --input-bg: #fdfdf9; 
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', 'Malgun Gothic', sans-serif; scroll-behavior: smooth; }
        
        body { background-color: var(--bg); color: #fff; padding: 15px; display: flex; justify-content: center; }
        
        .container { max-width: 1180px; width: 100%; }

        .form-container { 
            background-color: var(--card);
            background-image: 
                radial-gradient(rgba(186, 218, 85, 0.12) 1px, transparent 1px),
                linear-gradient(180deg, rgba(186, 218, 85, 0.03) 0%, rgba(0, 0, 0, 0) 100%);
            background-size: 22px 22px, 100% 100%;
            padding: 40px 50px; /* 잘림 방지를 위해 패딩 약간 축소 */
            border: 1.5px solid #2a2a26;
            border-radius: 35px;
        }

        .header { margin-bottom: 35px; display: flex; align-items: center; gap: 20px; }
        .header-logo { width: 55px; height: 55px; object-fit: contain; }
        .header h1 { color: var(--input-bg); font-size: 32px; font-weight: 900; line-height: 1.1; letter-spacing: -1.5px; }
        .header p { color: #fff; font-size: 15px; opacity: 0.8; margin-top: 5px; }

        .form-group { margin-bottom: 25px; }
        .form-group label.title { display: block; color: var(--point); font-weight: 700; margin-bottom: 10px; font-size: 15px; }

        input[type="text"], input[type="date"], textarea {
            width: 100%; padding: 15px 20px; background: var(--input-bg); border: 2px solid transparent;
            border-radius: 50px; font-size: 15px; color: #1a1a1a; outline: none; 
            transition: all 0.3s ease;
        }
        textarea { border-radius: 20px; min-height: 130px; resize: vertical; }

        input:focus, textarea:focus { border-color: var(--glow); box-shadow: 0 0 12px rgba(220, 240, 115, 0.5); }

        .checkbox-group { display: flex; flex-wrap: wrap; gap: 10px 20px; padding: 5px; }
        .checkbox-label { display: flex; align-items: center; cursor: pointer; font-size: 14px; color: #eee; }

        input[type="checkbox"], input[type="radio"] { appearance: none; -webkit-appearance: none; width: 18px; height: 18px; background: #fdfdf9; margin-right: 10px; cursor: pointer; position: relative; }
        input[type="radio"] { border-radius: 50%; }
        input[type="checkbox"] { border-radius: 4px; }
        input:checked { background-color: var(--point); }
        input:checked::after { content: '✔'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #1a1a1a; font-size: 10px; font-weight: 900; }

        .submit-area { text-align: center; margin-top: 40px; }
        .submit-btn {
            background: linear-gradient(to bottom, #dcf073 0%, #a2c629 100%);
            color: #1a1a1a; border: none; padding: 16px 70px; font-size: 22px; font-weight: 900; border-radius: 60px;
            cursor: pointer; box-shadow: 0 5px 0 #6e881c;
        }
        .submit-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #6e881c; }

        /* 안내사항 링크 스타일 */
        .notice-link { color: var(--point); text-decoration: underline; cursor: pointer; font-weight: 800; position: relative; z-index: 10; }

        @media (max-width: 600px) { .form-container { padding: 25px; } .header h1 { font-size: 24px; } }
    </style>
</head>
<body>

<div class="container">
    <div class="form-container">
        <div class="header">
            <img src="본인_로고_주소" alt="logo" class="header-logo">
            <div class="header-text">
                <h1>Studio DW : Order Form</h1>
                <p>“빠르고 쉽게 문의하세요”</p>
            </div>
        </div>

        <form id="orderForm">
            <div class="form-group">
                <label class="title">업로드 채널 <span>(링크)</span></label>
                <input type="text" id="channel" placeholder="채널 링크를 입력해주세요">
            </div>

            <div class="form-group">
                <label class="title">원곡 링크</label>
                <input type="text" id="original_link" placeholder="참고 링크를 입력해주세요">
            </div>

            <div class="form-group">
                <label class="title">사용 용도</label>
                <input type="text" id="usage" placeholder="Youtube / 송출 등">
            </div>

            <div class="form-group">
                <label class="title">신청 타입 (필수)</label>
                <div class="checkbox-group">
                    <label class="checkbox-label"><input type="radio" name="type" value="스탠다드"> 스탠다드</label>
                    <label class="checkbox-label"><input type="radio" name="type" value="프리미엄"> 프리미엄</label>
                    <label class="checkbox-label"><input type="radio" name="type" value="시그니처"> 시그니처</label>
                </div>
            </div>

            <div class="form-group">
                <label class="title">자막 언어 (필수)</label>
                <div class="checkbox-group">
                    <label class="checkbox-label"><input type="radio" name="lang" value="한국어"> 한국어</label>
                    <label class="checkbox-label"><input type="radio" name="lang" value="일본어"> 일본어</label>
                </div>
            </div>

            <div class="form-group">
                <label class="title">추가옵션</label>
                <div class="checkbox-group">
                    <label class="checkbox-label"><input type="checkbox" name="opt" value="썸네일"> 썸네일</label>
                    <label class="checkbox-label"><input type="checkbox" name="opt" value="수익창출"> 수익창출</label>
                    <label class="checkbox-label"><input type="checkbox" name="opt" value="빠른마감"> 빠른마감</label>
                </div>
            </div>

            <div class="form-group">
                <label class="title">희망 마감일</label>
                <input type="date" id="deadline">
            </div>

            <div class="form-group">
                <label class="title">희망 연출 / 크레딧</label>
                <textarea id="credit" placeholder="상세 요청 사항"></textarea>
            </div>

            <div class="form-group">
                <label class="checkbox-label" style="color: var(--point); font-weight: bold;">
                    <input type="checkbox" id="agree"> 
                    <span onclick="event.stopPropagation(); window.parent.scrollTo({top: 8500, behavior: 'smooth'});" class="notice-link">안내사항을 확인</span>하고 이에 동의합니다.
                </label>
            </div>

            <div class="submit-area">
                <button type="button" class="submit-btn" onclick="copyResult()">작성완료</button>
            </div>
        </form>
    </div>
</div>

<script>
    function copyResult() {
        if(!document.getElementById('agree').checked) {
            alert('안내사항 동의에 체크해주세요!'); 
            return; 
        }

        var getCheck = function(name) {
            var checked = Array.from(document.querySelectorAll('input[name="' + name + '"]:checked'));
            return checked.map(function(el) { return el.value; }).join(', ');
        };

        var typeCheck = getCheck('type');
        var langCheck = getCheck('lang');
        if(!typeCheck || !langCheck) { alert('필수 항목을 선택해주세요!'); return; }

        var getVal = function(id) { return document.getElementById(id).value || '미입력'; };
        var optCheck = getCheck('opt') || '선택안함';

        var text = "[STUDIO DW 신청서]\n" +
                   "■ 채널: " + getVal('channel') + "\n" +
                   "■ 타입: " + typeCheck + "\n" +
                   "■ 언어: " + langCheck + "\n" +
                   "■ 옵션: " + optCheck + "\n" +
                   "■ 마감일: " + getVal('deadline') + "\n" +
                   "■ 연출/크레딧: \n" + getVal('credit');

        var t = document.createElement("textarea");
        document.body.appendChild(t);
        t.value = text; t.select();
        document.execCommand('copy');
        document.body.removeChild(t);
        alert('복사되었습니다!');
    }
</script>
</body>
</html>
