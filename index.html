<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio DW : Order Form</title>
    <style>
        :root { 
            --point: #bada55; 
            --glow: #dcf073; 
            --bg: transparent; 
            --card: #151512; 
            --input-bg: #fdfdf9; 
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', 'Malgun Gothic', sans-serif; }
        
        body { background-color: var(--bg); color: #fff; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 850px; width: 100%; }

        .form-container { 
            background-color: var(--card);
            background-image: 
                radial-gradient(rgba(186, 218, 85, 0.12) 1px, transparent 1px),
                linear-gradient(180deg, rgba(186, 218, 85, 0.03) 0%, rgba(0, 0, 0, 0) 100%);
            background-size: 22px 22px, 100% 100%;
            padding: 40px;
            border: 1.5px solid #2a2a26;
            border-radius: 35px;
            /* 외곽 그림자만 제거 */
            box-shadow: none; 
        }

        .header { margin-bottom: 40px; }
        .header h1 { color: var(--input-bg); font-size: 32px; font-weight: 900; line-height: 1.1; letter-spacing: -1.5px; margin-bottom: 10px; }
        .header p { color: #fff; font-size: 15px; font-weight: 500; opacity: 0.8; }

        .form-group { margin-bottom: 30px; }
        .form-group label.title { display: block; color: var(--point); font-weight: 700; margin-bottom: 12px; font-size: 15px; }
        .form-group label.title span { color: var(--point); opacity: 0.7; font-weight: 400; font-size: 13px; margin-left: 5px; }

        input[type="text"], input[type="date"], textarea {
            width: 100%; padding: 14px 20px; background: var(--input-bg); border: 2px solid transparent;
            border-radius: 50px; font-size: 14px; color: #1a1a1a; outline: none; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        textarea { border-radius: 20px; min-height: 120px; resize: vertical; line-height: 1.6; }

        /* [복구] 포커스 시 네온 글로우 효과 - 그림자가 아니라 빛나는 효과입니다 */
        input:focus, textarea:focus { 
            background: #fff; 
            border-color: var(--glow); 
            box-shadow: 0 0 15px rgba(220, 240, 115, 0.6); 
            transform: translateY(-2px);
        }

        .checkbox-group { display: flex; flex-wrap: wrap; gap: 10px 20px; padding: 5px; }
        .checkbox-label { display: flex; align-items: center; cursor: pointer; font-size: 14px; color: #eee; transition: 0.2s; }
        .checkbox-label:hover { color: var(--glow); }

        input[type="checkbox"], input[type="radio"] { appearance: none; -webkit-appearance: none; width: 18px; height: 18px; background: #fdfdf9; margin-right: 8px; cursor: pointer; position: relative; transition: 0.2s; }
        input[type="radio"] { border-radius: 50%; }
        input[type="checkbox"] { border-radius: 4px; }
        input:checked { background-color: var(--point); box-shadow: 0 0 8px rgba(186, 218, 85, 0.4); }
        input:checked::after { content: '✔'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #1a1a1a; font-size: 11px; font-weight: 900; }

        .submit-area { text-align: center; margin-top: 40px; }
        .submit-btn {
            background: linear-gradient(to bottom, #dcf073 0%, #a2c629 100%);
            color: #1a1a1a; border: none; padding: 16px 60px; font-size: 22px; font-weight: 900; border-radius: 50px;
            cursor: pointer; transition: 0.3s; box-shadow: 0 6px 0 #6e881c;
        }
        .submit-btn:hover { filter: brightness(1.1); }
        .submit-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #6e881c; }

        /* [복구] 반응형 레이아웃 */
        @media (max-width: 600px) { 
            .form-container { padding: 30px 20px; } 
            .header h1 { font-size: 26px; } 
            .submit-btn { width: 100%; padding: 16px 0; font-size: 20px; }
            .checkbox-group { gap: 10px 15px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="form-container">
        <div class="header">
            <h1>Studio DW : Order Form</h1>
            <p>“빠르고 쉽게 문의하세요”</p>
        </div>

        <form id="orderForm">
            <div class="form-group">
                <label class="title">업로드 채널 <span>(링크)</span></label>
                <input type="text" id="channel" placeholder="채널 링크를 입력해주세요">
            </div>

            <div class="form-group">
                <label class="title">원곡 링크 <span>(Youtube 등)</span></label>
                <input type="text" id="original_link" placeholder="참고 링크를 입력해주세요">
            </div>

            <div class="form-group">
                <label class="title">사용 용도</label>
                <input type="text" id="usage" placeholder="Youtube / 방송용 / 오프라인 등">
            </div>

            <div class="form-group">
                <label class="title">신청 타입</label>
                <div class="checkbox-group">
                    <label class="checkbox-label"><input type="radio" name="type" value="스탠다드"> 스탠다드</label>
                    <label class="checkbox-label"><input type="radio" name="type" value="프리미엄"> 프리미엄</label>
                    <label class="checkbox-label"><input type="radio" name="type" value="시그니처"> 시그니처</label>
                    <label class="checkbox-label"><input type="radio" name="type" value="상담희망"> 상담희망</label>
                </div>
            </div>

            <div class="form-group">
                <label class="title">자막 언어</label>
                <div class="checkbox-group">
                    <label class="checkbox-label"><input type="radio" name="lang" value="한국어"> 한국어</label>
                    <label class="checkbox-label"><input type="radio" name="lang" value="일본어"> 일본어</label>
                    <label class="checkbox-label"><input type="radio" name="lang" value="영어"> 영어</label>
                </div>
            </div>

            <div class="form-group">
                <label class="title">추가옵션 <span>(중복 가능)</span></label>
                <div class="checkbox-group">
                    <label class="checkbox-label"><input type="checkbox" name="opt" value="썸네일"> 썸네일</label>
                    <label class="checkbox-label"><input type="checkbox" name="opt" value="Live2D"> Live2D</label>
                    <label class="checkbox-label"><input type="checkbox" name="opt" value="배경2D"> 배경(2D)</label>
                    <label class="checkbox-label"><input type="checkbox" name="opt" value="배경3D"> 배경(3D)</label>
                    <label class="checkbox-label"><input type="checkbox" name="opt" value="수익창출"> 수익창출</label>
                    <label class="checkbox-label"><input type="checkbox" name="opt" value="빠른마감"> 빠른마감</label>
                    <label class="checkbox-label"><input type="checkbox" name="opt" value="숏폼"> SNS/숏폼</label>
                </div>
            </div>

            <div class="form-group">
                <label class="title">희망 마감일</label>
                <input type="date" id="deadline">
            </div>

            <div class="form-group">
                <label class="title">희망 연출 / 크레딧</label>
                <textarea id="credit" placeholder="연출 희망 사항이나 크레딧 정보"></textarea>
            </div>

            <div class="form-group">
                <label class="checkbox-label" style="color: var(--point); font-weight: bold;">
                    <input type="checkbox" id="agree"> 안내사항을 확인하고 이에 동의합니다.
                </label>
            </div>

            <div class="submit-area">
                <button type="button" class="submit-btn" onclick="copyResult()">작성완료</button>
                <p style="color: #666; font-size: 13px; margin-top: 15px;">※ 버튼 클릭 시 양식이 복사됩니다.</p>
            </div>
        </form>
    </div>
</div>

<script>
    function copyResult() {
        if(!document.getElementById('agree').checked) {
            alert('안내사항 동의에 체크해주세요!'); 
            return; 
        }

        var getVal = function(id) { return document.getElementById(id).value || '미입력'; };
        var getCheck = function(name) {
            var checked = Array.from(document.querySelectorAll('input[name="' + name + '"]:checked'));
            return checked.map(function(el) { return el.value; }).join(', ') || '선택안함';
        };

        var text = "[STUDIO DW 신청서]\n" +
                   "■ 채널: " + getVal('channel') + "\n" +
                   "■ 원곡: " + getVal('original_link') + "\n" +
                   "■ 용도: " + getVal('usage') + "\n" +
                   "■ 타입: " + getCheck('type') + "\n" +
                   "■ 언어: " + getCheck('lang') + "\n" +
                   "■ 옵션: " + getCheck('opt') + "\n" +
                   "■ 마감일: " + getVal('deadline') + "\n" +
                   "■ 연출/크레딧: \n" + getVal('credit');

        var t = document.createElement("textarea");
        document.body.appendChild(t);
        t.value = text;
        t.select();
        document.execCommand('copy');
        document.body.removeChild(t);
        
        alert('양식이 복사되었습니다! 아트머그 문의창에 붙여넣어 주세요.');
    }
</script>
</body>
</html>
