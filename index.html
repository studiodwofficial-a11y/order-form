<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio DW : Order Form</title>
    <style>
        :root { 
            --point: #bada55; 
            --glow: #dcf073; 
            --bg: transparent; 
            --card: #151512; 
            --input-bg: #fdfdf9; 
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', 'Malgun Gothic', sans-serif; scroll-behavior: smooth; }
        body { background-color: var(--bg); color: #fff; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 1180px; width: 100%; }

        .form-container { 
            background-color: var(--card);
            background-image: 
                radial-gradient(rgba(186, 218, 85, 0.12) 1px, transparent 1px),
                linear-gradient(180deg, rgba(186, 218, 85, 0.03) 0%, rgba(0, 0, 0, 0) 100%);
            background-size: 22px 22px, 100% 100%;
            padding: 50px 60px;
            border: 1.5px solid #2a2a26;
            border-radius: 35px;
        }

        .header { margin-bottom: 45px; display: flex; align-items: center; gap: 20px; }
        .header-logo { width: 60px; height: 60px; object-fit: contain; }
        .header-text { display: flex; flex-direction: column; }
        .header h1 { color: var(--input-bg); font-size: 36px; font-weight: 900; line-height: 1.1; letter-spacing: -1.5px; }
        .header p { color: #fff; font-size: 16px; font-weight: 500; opacity: 0.8; margin-top: 5px; }

        .form-group { margin-bottom: 30px; }
        .form-group label.title { display: block; color: var(--point); font-weight: 700; margin-bottom: 12px; font-size: 15px; }

        input[type="text"], input[type="date"], textarea {
            width: 100%; padding: 16px 22px; background: var(--input-bg); border: 2px solid transparent;
            border-radius: 50px; font-size: 15px; color: #1a1a1a; outline: none; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        textarea { border-radius: 20px; min-height: 140px; resize: vertical; }

        input:focus, textarea:focus { 
            background: #fff; 
            border-color: var(--glow); 
            box-shadow: 0 0 15px rgba(220, 240, 115, 0.6); 
            transform: translateY(-2px);
        }

        .checkbox-group { display: flex; flex-wrap: wrap; gap: 12px 25px; padding: 5px; }
        .checkbox-label { display: flex; align-items: center; cursor: pointer; font-size: 14px; color: #eee; }

        input[type="checkbox"], input[type="radio"] { appearance: none; -webkit-appearance: none; width: 19px; height: 19px; background: #fdfdf9; margin-right: 10px; cursor: pointer; position: relative; }
        input[type="radio"] { border-radius: 50%; }
        input[type="checkbox"] { border-radius: 5px; }
        input:checked { background-color: var(--point); }
        input:checked::after { content: '✔'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #1a1a1a; font-size: 11px; font-weight: 900; }

        .submit-area { text-align: center; margin-top: 45px; }
        .submit-btn {
            background: linear-gradient(to bottom, #dcf073 0%, #a2c629 100%);
            color: #1a1a1a; border: none; padding: 18px 80px; font-size: 24px; font-weight: 900; border-radius: 60px;
            cursor: pointer; box-shadow: 0 6px 0 #6e881c;
        }

        .notice-link { color: var(--point); text-decoration: underline; cursor: pointer; font-weight: 800; }

        @media (max-width: 600px) { .form-container { padding: 35px 25px; } }
    </style>
</head>
<body>

<div class="container">
    <div class="form-container">
        <div class="header">
            <img src="본인_로고_주소" alt="logo" class="header-logo">
            <div class="header-text">
                <h1>Studio DW : Order Form</h1>
                <p>“빠르고 쉽게 문의하세요”</p>
            </div>
        </div>

        <form id="orderForm">
            <div class="form-group">
                <label class="title">신청 타입 (필수)</label>
                <div class="checkbox-group">
                    <label class="checkbox-label"><input type="radio" name="type" value="스탠다드"> 스탠다드</label>
                    <label class="checkbox-label"><input type="radio" name="type" value="프리미엄"> 프리미엄</label>
                    <label class="checkbox-label"><input type="radio" name="type" value="시그니처"> 시그니처</label>
                </div>
            </div>

            <div class="form-group">
                <label class="title">자막 언어 (필수)</label>
                <div class="checkbox-group">
                    <label class="checkbox-label"><input type="radio" name="lang" value="한국어"> 한국어</label>
                    <label class="checkbox-label"><input type="radio" name="lang" value="일본어"> 일본어</label>
                </div>
            </div>

            <div class="form-group">
                <label class="checkbox-label" style="color: var(--point); font-weight: bold;">
                    <input type="checkbox" id="agree"> 
                    <span onclick="forceScroll(8500)" class="notice-link">안내사항을 확인</span>하고 이에 동의합니다.
                </label>
            </div>

            <div class="submit-area">
                <button type="button" class="submit-btn" onclick="copyResult()">작성완료</button>
            </div>
        </form>
    </div>
</div>

<script>
    function forceScroll(y) {
        try {
            // 1순위: 부모 창 스크롤 시도
            window.parent.scrollTo({ top: y, behavior: 'smooth' });
        } catch (e) {
            // 2순위: 보안으로 막혔을 경우 현재 페이지 자체를 이동 (앵커 활용 가능)
            console.log("스크롤 제한됨 - 대안 실행");
            // 만약 새 탭으로 안내사항만 다시 보여주고 싶다면 아래 주석을 해제하세요.
            // window.open('유저님의_아트머그_주소#anchor-location');
        }
    }

    function copyResult() {
        if(!document.getElementById('agree').checked) { alert('안내사항 동의에 체크해주세요!'); return; }
        
        var getCheck = function(name) {
            var checked = Array.from(document.querySelectorAll('input[name="' + name + '"]:checked'));
            return checked.map(function(el) { return el.value; }).join(', ');
        };

        var typeCheck = getCheck('type');
        var langCheck = getCheck('lang');
        if(!typeCheck || !langCheck) { alert('필수 항목을 선택해주세요!'); return; }

        var text = "[STUDIO DW 신청서]\n■ 타입: " + typeCheck + "\n■ 언어: " + langCheck;
        
        var t = document.createElement("textarea");
        document.body.appendChild(t);
        t.value = text; t.select();
        document.execCommand('copy');
        document.body.removeChild(t);
        alert('양식이 복사되었습니다!');
    }
</script>
</body>
</html>
